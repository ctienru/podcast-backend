search:
  default-lang: ${SEARCH_DEFAULT_LANG:en}
  show:
    template:
      path: podcast-spec/es/search_shows/query.template.mustache
  episode:
    template:
      path: podcast-spec/es/search_episodes/query.template.mustache

# Embedding service configuration
embedding:
  external:
    url: ${EMBEDDING_API_URL:}
    key: ${EMBEDDING_API_KEY:}
    model-zh: ${EMBEDDING_MODEL_ZH:paraphrase-multilingual-MiniLM-L12-v2}
    model-en: ${EMBEDDING_MODEL_EN:paraphrase-multilingual-MiniLM-L12-v2}
    timeout-ms: ${EMBEDDING_TIMEOUT_MS:2000}
  cache:
    ttl-minutes: ${EMBEDDING_CACHE_TTL_MINUTES:30}
    max-size: ${EMBEDDING_CACHE_MAX_SIZE:1000}

# Elasticsearch configuration
elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  scheme: ${ELASTICSEARCH_SCHEME:http}
  # Auth Method 1: API Key (priority)
  api-key-id: ${ELASTICSEARCH_API_KEY_ID:}
  api-key-secret: ${ELASTICSEARCH_API_KEY_SECRET:}
  # Auth Method 2: Basic Auth
  username: ${ELASTICSEARCH_USERNAME:}
  password: ${ELASTICSEARCH_PASSWORD:}
  connect-timeout: ${ELASTICSEARCH_CONNECT_TIMEOUT:5000}
  socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:30000}
  indices:
    shows: ${ELASTICSEARCH_INDEX_SHOWS:shows}
    episodes:
      zh-tw: ${ELASTICSEARCH_INDEX_EPISODES_ZH_TW:episodes-zh-tw}
      zh-cn: ${ELASTICSEARCH_INDEX_EPISODES_ZH_CN:episodes-zh-cn}
      en: ${ELASTICSEARCH_INDEX_EPISODES_EN:episodes-en}

# Rankings cache configuration
rankings:
  cache:
    ttl-seconds: ${RANKINGS_CACHE_TTL:3600}

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Resilience4j Rate Limiter configuration
resilience4j:
  ratelimiter:
    instances:
      searchApi:
        limit-for-period: ${RATE_LIMIT_SEARCH:50}
        limit-refresh-period: 1s
        timeout-duration: 0s
      rankingsApi:
        limit-for-period: ${RATE_LIMIT_RANKINGS:30}
        limit-refresh-period: 1s
        timeout-duration: 0s
  circuitbreaker:
    instances:
      embeddingApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      appleApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s